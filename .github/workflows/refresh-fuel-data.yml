name: Refresh Fuel Cache

on:
  schedule:
    # Cada día a las 08:00 UTC (10:00 hora española en verano)
    - cron: '0 8 * * *'
  workflow_dispatch: # Permite dispararlo manualmente desde GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests "xlrd==1.2.0"

      - name: Refresh fuel cache
        run: python scripts/refresh_cache.py

      - name: Check price alerts and send emails
        if: always()
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: python scripts/check_alerts.py
