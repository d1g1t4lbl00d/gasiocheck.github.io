<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DinoCheck 🦕 Zumo de Dinosaurio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #fff8f2;
    --surface: #ffffff;
    --surface2: #fff3ea;
    --border: #fde0c8;
    --orange: #ff6b2b;
    --orange-light: #ff8c57;
    --orange-dim: #e55a1f;
    --orange-pale: #fff0e6;
    --green: #3dba7e;
    --red: #ff4d6d;
    --blue: #4da6ff;
    --text: #2d1f0e;
    --text-soft: #7a5c45;
    --muted: #c9a88a;
    --font-display: 'Fredoka', sans-serif;
    --font-body: 'Nunito', sans-serif;
    --radius: 18px;
    --radius-sm: 12px;
    --shadow: 0 4px 20px rgba(255,107,43,0.12);
    --shadow-card: 0 2px 12px rgba(0,0,0,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle background pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 20% 20%, rgba(255,107,43,0.05) 0%, transparent 50%),
                      radial-gradient(circle at 80% 80%, rgba(255,140,87,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─── */
  header {
    background: var(--orange);
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 62px;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 3px 16px rgba(255,107,43,0.35);
  }

  .logo {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 700;
    color: white;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.5px;
  }

  .logo-dino {
    font-size: 28px;
    line-height: 1;
    animation: dino-bob 2.5s ease-in-out infinite;
  }

  @keyframes dino-bob {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-4px) rotate(3deg); }
  }

  .header-tag {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    background: rgba(255,255,255,0.18);
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }

  /* ─── LAYOUT ─── */
  .app-layout {
    display: grid;
    grid-template-columns: 370px 1fr;
    height: calc(100vh - 62px);
    position: relative;
    z-index: 1;
  }

  /* ─── SIDEBAR ─── */
  .sidebar {
    background: var(--surface);
    border-right: 2px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ─── SEARCH PANEL ─── */
  .search-panel {
    padding: 18px 16px 14px;
    border-bottom: 2px solid var(--border);
    background: var(--surface);
  }

  .search-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    color: var(--orange);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .search-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  select, input {
    background: var(--surface2);
    border: 2px solid var(--border);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    padding: 10px 13px;
    border-radius: var(--radius-sm);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }

  select:focus, input:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(255,107,43,0.12);
  }

  select option { background: white; }

  .btn {
    background: var(--orange);
    color: white;
    border: none;
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 14px;
    padding: 10px 16px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.18s;
    box-shadow: 0 3px 10px rgba(255,107,43,0.3);
  }

  .btn:hover { background: var(--orange-dim); transform: translateY(-1px); box-shadow: 0 5px 14px rgba(255,107,43,0.35); }
  .btn:active { transform: translateY(0); }

  .btn-ghost {
    background: var(--orange-pale);
    color: var(--orange);
    border: 2px solid var(--border);
    box-shadow: none;
    font-weight: 700;
  }

  .btn-ghost:hover { background: #ffe4d0; border-color: var(--orange-light); transform: translateY(-1px); box-shadow: 0 3px 10px rgba(255,107,43,0.12); }

  .fuel-filter {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  .fuel-chip {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 30px;
    border: 2px solid var(--border);
    background: var(--surface2);
    color: var(--text-soft);
    cursor: pointer;
    transition: all 0.18s;
  }

  .fuel-chip.active {
    background: var(--orange);
    color: white;
    border-color: var(--orange);
    box-shadow: 0 3px 10px rgba(255,107,43,0.3);
  }

  .fuel-chip:hover:not(.active) {
    border-color: var(--orange-light);
    color: var(--orange);
    background: var(--orange-pale);
  }

  /* ─── STATS BAR ─── */
  .stats-bar {
    padding: 12px 16px;
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--border);
    background: var(--orange-pale);
  }

  .stat-item { text-align: center; flex: 1; }

  .stat-value {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 600;
    color: var(--orange);
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  .stat-divider {
    width: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* ─── SORT ROW ─── */
  .sort-row {
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 2px solid var(--border);
    background: var(--surface);
  }

  .sort-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .sort-btn {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 20px;
    border: 2px solid var(--border);
    background: var(--surface2);
    color: var(--text-soft);
    cursor: pointer;
    transition: all 0.15s;
  }

  .sort-btn.active {
    border-color: var(--orange);
    color: var(--orange);
    background: var(--orange-pale);
  }

  /* ─── STATIONS LIST ─── */
  .stations-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }

  .stations-list::-webkit-scrollbar { width: 5px; }
  .stations-list::-webkit-scrollbar-track { background: var(--surface2); border-radius: 10px; }
  .stations-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  /* ─── STATION CARD ─── */
  .station-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow-card);
    position: relative;
  }

  .station-card:hover {
    border-color: var(--orange-light);
    box-shadow: 0 4px 18px rgba(255,107,43,0.15);
    transform: translateY(-2px);
  }

  .station-card.selected {
    border-color: var(--orange);
    box-shadow: 0 4px 20px rgba(255,107,43,0.22);
  }

  .station-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
  }

  .station-name {
    font-weight: 800;
    font-size: 14px;
    color: var(--text);
    line-height: 1.3;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .station-sub {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    margin-top: 2px;
  }

  .price-badge {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
    white-space: nowrap;
    text-align: right;
    line-height: 1;
  }

  .price-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-align: right;
    margin-top: 2px;
  }

  .price-cheap { color: var(--green); }
  .price-avg { color: var(--orange); }
  .price-expensive { color: var(--red); }

  .station-address {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-soft);
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .station-prices {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .mini-price {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    color: var(--text-soft);
  }

  .mini-price .pfuel { color: var(--muted); font-size: 10px; margin-right: 2px; }

  /* Price dot */
  .price-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 3px;
  }

  .dot-cheap { background: var(--green); }
  .dot-avg { background: var(--orange); }
  .dot-expensive { background: var(--red); }

  /* ─── MAP ─── */
  #map {
    width: 100%;
    height: 100%;
  }

  /* ─── STATES ─── */
  .state-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 40px 24px;
    text-align: center;
  }

  .state-dino { font-size: 56px; animation: dino-bob 2.5s ease-in-out infinite; }

  .state-text {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-soft);
    line-height: 1.6;
    max-width: 260px;
  }

  .state-subtitle {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    max-width: 240px;
    line-height: 1.5;
  }

  .spinner {
    width: 38px;
    height: 38px;
    border: 3px solid var(--border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-banner {
    background: #fff0f3;
    border: 2px solid #ffd0da;
    color: #c0384f;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    margin: 12px;
    line-height: 1.5;
  }

  /* ─── MAP POPUP ─── */
  .leaflet-popup-content-wrapper {
    background: white !important;
    border: 2px solid var(--border) !important;
    border-radius: 16px !important;
    box-shadow: 0 8px 28px rgba(0,0,0,0.12) !important;
    color: var(--text) !important;
    font-family: var(--font-body) !important;
  }

  .leaflet-popup-tip { background: white !important; }

  .popup-name {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 15px;
    color: var(--orange);
    margin-bottom: 3px;
  }

  .popup-address { font-size: 11px; color: var(--muted); font-weight: 500; margin-bottom: 8px; }

  .popup-prices { display: flex; flex-direction: column; gap: 4px; }

  .popup-price-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    font-weight: 600;
    gap: 16px;
  }

  .popup-fuel-name { color: var(--text-soft); }
  .popup-fuel-price { color: var(--text); font-weight: 800; }

  /* ─── BOTTOM TAB BAR ─── */
  .tab-bar { display: none; }

  /* ─── MOBILE ─── */
  @media (max-width: 768px) {

    body { overflow: hidden; }

    header { height: 54px; padding: 0 16px; }
    .logo { font-size: 22px; }
    .logo-dino { font-size: 24px; }
    .header-tag { font-size: 10px; padding: 3px 9px; }

    .app-layout {
      display: block;
      height: calc(100dvh - 54px - 58px);
      position: relative;
    }

    .sidebar {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 10;
    }

    .sidebar.active { display: flex; }

    #map-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
      z-index: 10;
    }

    #map-container.active { display: block; }

    .search-panel { padding: 12px 14px 10px; }
    .search-title { font-size: 16px; margin-bottom: 10px; }

    select, input { font-size: 14px; padding: 10px 12px; }
    .btn { font-size: 13px; padding: 10px 14px; }
    .fuel-chip { font-size: 12px; padding: 6px 11px; }

    .stats-bar { gap: 0; padding: 10px 14px; flex-shrink: 0; }
    .stat-value { font-size: 17px; }

    .sort-row { padding: 8px 14px; flex-shrink: 0; }

    #list-container {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .stations-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 10px;
      overscroll-behavior: contain;
    }

    .station-card { padding: 12px; margin-bottom: 8px; }

    /* Search collapse */
    .search-collapse-btn {
      cursor: pointer;
      margin-bottom: 0;
    }

    .search-collapse-btn .chevron {
      font-size: 13px;
      color: var(--muted);
      transition: transform 0.25s;
    }

    .search-body {
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.25s;
      max-height: 0;
      opacity: 0;
    }

    .search-body.open { max-height: 420px; opacity: 1; }
    .search-body-inner { padding-top: 10px; }

    /* Tab bar */
    .tab-bar {
      display: flex;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 58px;
      background: white;
      border-top: 2px solid var(--border);
      z-index: 200;
    }

    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2px;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .tab-btn .tab-icon { font-size: 22px; line-height: 1; }
    .tab-btn.active { color: var(--orange); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-dino">🦕</span>
    DinoCheck
  </div>
  <div class="header-tag">🌿 Zumo de dino en tiempo real</div>
</header>

<div class="app-layout">

  <aside class="sidebar">
    <div class="search-panel">
      <div class="search-title search-collapse-btn" onclick="toggleSearch()">
        🔍 ¿Dónde cargas?
        <span class="chevron" id="search-chevron">▼</span>
      </div>

      <div class="search-body" id="search-body">
        <div class="search-body-inner">
          <div class="search-row">
            <select id="sel-prov" onchange="onProvinciaChange()">
              <option value="">— Provincia —</option>
            </select>
          </div>

          <div class="search-row">
            <select id="sel-mun" disabled>
              <option value="">— Municipio —</option>
            </select>
            <button class="btn" onclick="buscarPorMunicipio()">Buscar</button>
          </div>

          <div class="search-row" style="margin-top:6px;">
            <button class="btn btn-ghost" onclick="usarMiUbicacion()" style="width:100%">
              📍 Usar mi ubicación
            </button>
          </div>

          <div class="fuel-filter" id="fuel-filter">
            <div class="fuel-chip active" data-fuel="gasolina95" onclick="toggleFuel(this)">🟢 G-95</div>
            <div class="fuel-chip" data-fuel="gasolina98" onclick="toggleFuel(this)">⚡ G-98</div>
            <div class="fuel-chip" data-fuel="gasoleoA" onclick="toggleFuel(this)">🦴 Gasóleo A</div>
            <div class="fuel-chip" data-fuel="gasoleoB" onclick="toggleFuel(this)">🥚 Gasóleo B</div>
            <div class="fuel-chip" data-fuel="glp" onclick="toggleFuel(this)">💨 GLP</div>
          </div>
        </div>
      </div>
    </div>

    <div id="stats-bar" class="stats-bar" style="display:none">
      <div class="stat-item">
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-label">Estaciones</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-value" id="stat-min">—</div>
        <div class="stat-label">Mín €/L</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-value" id="stat-avg">—</div>
        <div class="stat-label">Media €/L</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-value" id="stat-max">—</div>
        <div class="stat-label">Máx €/L</div>
      </div>
    </div>

    <div class="sort-row" id="sort-row" style="display:none">
      <span class="sort-label">Orden:</span>
      <button class="sort-btn active" onclick="setSortMode('precio', this)">Precio ↑</button>
      <button class="sort-btn" onclick="setSortMode('nombre', this)">Nombre</button>
      <button class="sort-btn" onclick="setSortMode('distancia', this)">Distancia</button>
    </div>

    <div id="list-container">
      <div class="state-panel">
        <div class="state-dino">🦕</div>
        <div class="state-text">¡Hola! Busca por ubicación o selecciona tu zona para encontrar el zumo más barato.</div>
        <div class="state-subtitle">Datos oficiales del Ministerio de Energía</div>
      </div>
    </div>
  </aside>

  <div id="map-container">
    <div id="map"></div>
  </div>

</div>

<nav class="tab-bar">
  <button class="tab-btn active" id="tab-lista" onclick="switchTab('lista')">
    <span class="tab-icon">☰</span>
    Lista
  </button>
  <button class="tab-btn" id="tab-mapa" onclick="switchTab('mapa')">
    <span class="tab-icon">🗺️</span>
    Mapa
  </button>
</nav>

<script>
// ─── MOBILE TABS ──────────────────────────────────────────
let currentTab = 'lista';

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-lista').classList.toggle('active', tab === 'lista');
  document.getElementById('tab-mapa').classList.toggle('active', tab === 'mapa');
  const sidebar = document.querySelector('.sidebar');
  const mapContainer = document.getElementById('map-container');
  if (tab === 'lista') {
    sidebar.classList.add('active');
    mapContainer.classList.remove('active');
  } else {
    sidebar.classList.remove('active');
    mapContainer.classList.add('active');
    setTimeout(() => mapInstance && mapInstance.invalidateSize(), 50);
  }
}

function applyLayout() {
  const isMobile = window.innerWidth <= 768;
  const sidebar = document.querySelector('.sidebar');
  const mapContainer = document.getElementById('map-container');
  if (!isMobile) {
    sidebar.classList.remove('active');
    mapContainer.classList.remove('active');
  } else {
    switchTab(currentTab);
  }
}

window.addEventListener('resize', applyLayout);

let searchOpen = false;
function toggleSearch() {
  searchOpen = !searchOpen;
  document.getElementById('search-body').classList.toggle('open', searchOpen);
  document.getElementById('search-chevron').style.transform = searchOpen ? 'rotate(180deg)' : '';
}

// ─── STATE ────────────────────────────────────────────────
const API = 'https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes';
let allStations = [];
let filteredStations = [];
let activeFuel = 'gasolina95';
let sortMode = 'precio';
let mapInstance = null;
let markersLayer = null;
let selectedCard = null;
let userPos = null;

const FUEL_MAP = {
  gasolina95: { key: 'Precio Gasolina 95 E5', label: 'G-95', short: '95' },
  gasolina98: { key: 'Precio Gasolina 98 E5', label: 'G-98', short: '98' },
  gasoleoA:   { key: 'Precio Gasoleo A', label: 'Gasóleo A', short: 'GA' },
  gasoleoB:   { key: 'Precio Gasoleo B', label: 'Gasóleo B', short: 'GB' },
  glp:        { key: 'Precio Gases licuados del petróleo', label: 'GLP', short: 'GLP' },
};

// ─── MAP INIT ─────────────────────────────────────────────
function initMap() {
  mapInstance = L.map('map', { zoomControl: true }).setView([40.416, -3.703], 6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19,
  }).addTo(mapInstance);
  markersLayer = L.layerGroup().addTo(mapInstance);
}

function makeIcon(color) {
  const colors = {
    cheap: '#3dba7e',
    avg: '#ff6b2b',
    expensive: '#ff4d6d',
    default: '#c9a88a'
  };
  const c = colors[color] || colors.default;
  return L.divIcon({
    className: '',
    html: `<div style="
      width:30px;height:30px;border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      background:${c};
      border:3px solid white;
      box-shadow:0 3px 10px rgba(0,0,0,0.2);
    "></div>`,
    iconSize: [30, 30],
    iconAnchor: [15, 30],
    popupAnchor: [0, -32],
  });
}

// ─── LOAD PROVINCIAS ──────────────────────────────────────
async function loadProvincias() {
  try {
    const res = await fetch(`${API}/Listados/Provincias/`);
    const data = await res.json();
    const sel = document.getElementById('sel-prov');
    data.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.IDPovincia;
      opt.textContent = p.Provincia;
      sel.appendChild(opt);
    });
  } catch(e) { showError('No se pudieron cargar las provincias.'); }
}

async function onProvinciaChange() {
  const idProv = document.getElementById('sel-prov').value;
  const selMun = document.getElementById('sel-mun');
  selMun.disabled = true;
  selMun.innerHTML = '<option>Cargando…</option>';
  if (!idProv) { selMun.innerHTML = '<option>— Municipio —</option>'; return; }
  try {
    const res = await fetch(`${API}/Listados/MunicipiosPorProvincia/${idProv}`);
    const data = await res.json();
    selMun.innerHTML = '<option value="">— Municipio —</option>';
    data.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.IDMunicipio;
      opt.textContent = m.Municipio;
      selMun.appendChild(opt);
    });
    selMun.disabled = false;
  } catch(e) { showError('No se pudieron cargar los municipios.'); }
}

async function buscarPorMunicipio() {
  const idMun = document.getElementById('sel-mun').value;
  if (!idMun) { alert('Elige un municipio primero 🦕'); return; }
  showLoading();
  try {
    const res = await fetch(`${API}/EstacionesTerrestres/FiltroMunicipio/${idMun}`);
    const data = await res.json();
    if (!data.ListaEESSPrecio) throw new Error('Sin datos');
    processStations(data.ListaEESSPrecio);
    if (window.innerWidth <= 768) { if (searchOpen) toggleSearch(); switchTab('lista'); }
  } catch(e) { showError('No hay datos para este municipio. ¡Prueba con otro!'); }
}

async function usarMiUbicacion() {
  if (!navigator.geolocation) { alert('Tu navegador no soporta geolocalización.'); return; }
  showLoading('Buscando dinos cerca de ti…');
  navigator.geolocation.getCurrentPosition(async pos => {
    userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    mapInstance.setView([userPos.lat, userPos.lng], 13);
    L.marker([userPos.lat, userPos.lng], {
      icon: L.divIcon({ className: '', html: '<div style="width:18px;height:18px;border-radius:50%;background:#4da6ff;border:3px solid white;box-shadow:0 0 0 4px rgba(77,166,255,0.25)"></div>', iconSize:[18,18], iconAnchor:[9,9] })
    }).addTo(markersLayer).bindPopup('📍 Estás aquí');

    showLoading('Rastreando zumo de dinosaurio…');
    try {
      const allRes = await fetch(`${API}/EstacionesTerrestres/`);
      const allData = await allRes.json();
      if (!allData.ListaEESSPrecio) throw new Error('Sin datos');
      const nearby = allData.ListaEESSPrecio.filter(s => {
        const lat = parseFloat(s.Latitud.replace(',', '.'));
        const lng = parseFloat((s['Longitud (WGS84)'] || s.Longitud || '').replace(',', '.'));
        if (isNaN(lat) || isNaN(lng)) return false;
        return haversine(userPos.lat, userPos.lng, lat, lng) <= 15;
      });
      processStations(nearby, true);
      if (window.innerWidth <= 768) { if (searchOpen) toggleSearch(); switchTab('lista'); }
    } catch(e) {
      showError('No se pudieron cargar gasolineras cercanas. Prueba a buscar por municipio.');
    }
  }, () => { showError('No se pudo obtener tu ubicación. Activa la geolocalización 📍'); });
}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function processStations(raw, sortByDist = false) {
  allStations = raw.map(s => {
    const lat = parseFloat(s.Latitud?.replace(',', '.'));
    const lng = parseFloat((s['Longitud (WGS84)'] || s.Longitud || '').replace(',', '.'));
    const dist = (userPos && !isNaN(lat) && !isNaN(lng)) ? haversine(userPos.lat, userPos.lng, lat, lng) : null;
    const prices = {};
    Object.entries(FUEL_MAP).forEach(([k, v]) => {
      const raw = s[v.key];
      prices[k] = raw && raw !== '' ? parseFloat(raw.replace(',', '.')) : null;
    });
    return { ...s, lat, lng, dist, prices };
  });
  if (sortByDist && userPos) sortMode = 'distancia';
  renderAll();
  document.getElementById('stats-bar').style.display = 'flex';
  document.getElementById('sort-row').style.display = 'flex';
}

function renderAll() {
  filteredStations = allStations
    .filter(s => s.prices[activeFuel] !== null)
    .sort((a, b) => {
      if (sortMode === 'precio') return (a.prices[activeFuel] || 99) - (b.prices[activeFuel] || 99);
      if (sortMode === 'nombre') return (a.Rótulo || '').localeCompare(b.Rótulo || '');
      if (sortMode === 'distancia') return (a.dist ?? 999) - (b.dist ?? 999);
      return 0;
    });
  updateStats();
  renderList();
  renderMarkers();
}

function updateStats() {
  const prices = filteredStations.map(s => s.prices[activeFuel]).filter(Boolean);
  document.getElementById('stat-total').textContent = filteredStations.length;
  document.getElementById('stat-min').textContent = prices.length ? Math.min(...prices).toFixed(3) : '—';
  document.getElementById('stat-avg').textContent = prices.length ? (prices.reduce((a,b)=>a+b,0)/prices.length).toFixed(3) : '—';
  document.getElementById('stat-max').textContent = prices.length ? Math.max(...prices).toFixed(3) : '—';
}

function getPriceClass(price, min, max) {
  if (!price) return 'default';
  const mid = (min + max) / 2;
  if (price <= min + (mid - min) * 0.4) return 'cheap';
  if (price >= max - (max - mid) * 0.4) return 'expensive';
  return 'avg';
}

function renderList() {
  const container = document.getElementById('list-container');
  if (!filteredStations.length) {
    container.innerHTML = `<div class="state-panel"><div class="state-dino">🦖</div><div class="state-text">Sin datos de ${FUEL_MAP[activeFuel].label} en esta zona. ¡Prueba otro combustible!</div></div>`;
    return;
  }

  const prices = filteredStations.map(s => s.prices[activeFuel]).filter(Boolean);
  const minP = Math.min(...prices), maxP = Math.max(...prices);

  container.innerHTML = '';
  const list = document.createElement('div');
  list.className = 'stations-list';

  filteredStations.forEach((s, i) => {
    const price = s.prices[activeFuel];
    const cls = getPriceClass(price, minP, maxP);

    const otherPrices = Object.entries(FUEL_MAP)
      .filter(([k]) => k !== activeFuel && s.prices[k])
      .map(([k, v]) => `<div class="mini-price"><span class="pfuel">${v.short}</span> ${s.prices[k]?.toFixed(3)}</div>`)
      .join('');

    const distStr = s.dist !== null ? `${s.dist.toFixed(1)} km · ` : '';

    const card = document.createElement('div');
    card.className = 'station-card';
    card.id = `card-${i}`;
    card.innerHTML = `
      <div class="station-header">
        <div style="flex:1;min-width:0">
          <div class="station-name">
            <span class="price-dot dot-${cls}"></span>
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.Rótulo || 'Gasolinera'}</span>
          </div>
          <div class="station-sub">${distStr}${s.Municipio || ''}</div>
        </div>
        <div style="flex-shrink:0;text-align:right">
          <div class="price-badge price-${cls}">${price?.toFixed(3)}</div>
          <div class="price-label">${FUEL_MAP[activeFuel].short} €/L</div>
        </div>
      </div>
      <div class="station-address">📍 ${s.Dirección || ''}</div>
      ${otherPrices ? `<div class="station-prices">${otherPrices}</div>` : ''}
    `;
    card.onclick = () => selectStation(i);
    list.appendChild(card);
  });

  container.appendChild(list);
}

function renderMarkers() {
  markersLayer.clearLayers();
  if (userPos) {
    L.marker([userPos.lat, userPos.lng], {
      icon: L.divIcon({ className: '', html: '<div style="width:18px;height:18px;border-radius:50%;background:#4da6ff;border:3px solid white;box-shadow:0 0 0 4px rgba(77,166,255,0.25)"></div>', iconSize:[18,18], iconAnchor:[9,9] })
    }).addTo(markersLayer).bindPopup('📍 Estás aquí');
  }

  const prices = filteredStations.map(s => s.prices[activeFuel]).filter(Boolean);
  const minP = Math.min(...prices), maxP = Math.max(...prices);
  const bounds = [];

  filteredStations.forEach((s, i) => {
    if (isNaN(s.lat) || isNaN(s.lng)) return;
    const cls = getPriceClass(s.prices[activeFuel], minP, maxP);
    const marker = L.marker([s.lat, s.lng], { icon: makeIcon(cls) });

    const otherRows = Object.entries(FUEL_MAP)
      .filter(([k]) => s.prices[k])
      .map(([k, v]) => `<div class="popup-price-row"><span class="popup-fuel-name">${v.label}</span><span class="popup-fuel-price">${s.prices[k]?.toFixed(3)} €</span></div>`)
      .join('');

    marker.bindPopup(`
      <div style="min-width:190px">
        <div class="popup-name">🦕 ${s.Rótulo || 'Gasolinera'}</div>
        <div class="popup-address">${s.Dirección || ''} · ${s.Municipio || ''}</div>
        <div class="popup-prices">${otherRows}</div>
      </div>
    `, { maxWidth: 240 });

    marker.on('click', () => selectStation(i, false));
    marker.addTo(markersLayer);
    s._marker = marker;
    bounds.push([s.lat, s.lng]);
  });

  if (bounds.length && !userPos) {
    mapInstance.fitBounds(bounds, { padding: [40, 40] });
  } else if (bounds.length && userPos) {
    mapInstance.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
  }
}

function selectStation(i, scrollToCard = true) {
  if (selectedCard) selectedCard.classList.remove('selected');
  const card = document.getElementById(`card-${i}`);
  if (card) {
    card.classList.add('selected');
    selectedCard = card;
    if (scrollToCard) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  const s = filteredStations[i];
  if (s && !isNaN(s.lat) && !isNaN(s.lng)) {
    if (window.innerWidth <= 768) switchTab('mapa');
    setTimeout(() => {
      mapInstance.invalidateSize();
      mapInstance.setView([s.lat, s.lng], 15, { animate: true });
      if (s._marker) s._marker.openPopup();
    }, 80);
  }
}

function toggleFuel(el) {
  document.querySelectorAll('.fuel-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeFuel = el.dataset.fuel;
  if (allStations.length) renderAll();
}

function setSortMode(mode, btn) {
  sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (allStations.length) renderAll();
}

function showLoading(msg = 'Cargando zumo de dino…') {
  document.getElementById('list-container').innerHTML = `
    <div class="state-panel">
      <div class="spinner"></div>
      <div class="state-text">${msg}</div>
    </div>`;
}

function showError(msg) {
  document.getElementById('list-container').innerHTML = `
    <div class="state-panel">
      <div class="error-banner">🦖 ${msg}</div>
    </div>`;
}

initMap();
loadProvincias();
applyLayout();
if (window.innerWidth <= 768) { toggleSearch(); }
</script>
</body>
</html>
